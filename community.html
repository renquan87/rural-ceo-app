  <meta property="og:title" content="交流社区 - "乡理人"点亮行动">

  <style>
    .comm-layout { max-width: 960px; margin: 0 auto; }
    .comm-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
    .comm-stat { background: var(--bg-white); border-radius: var(--radius-lg); padding: 28px; text-align: center; border: 1px solid var(--border-light); box-shadow: var(--shadow-sm); }
    .comm-stat-num { font-size: 36px; font-weight: 900; color: var(--moss); display: block; }
    .comm-stat-label { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
    .comm-groups-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; }
    .comm-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 40px; }
    .comm-group { display: flex; align-items: center; gap: 16px; background: var(--bg-white); border-radius: var(--radius-lg); padding: 22px 26px; border: 1px solid var(--border-light); box-shadow: var(--shadow-sm); cursor: pointer; transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease); }
    .comm-group:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--leaf-light); }
    .comm-group:focus-visible { outline: 2px solid var(--moss); outline-offset: 2px; }
    .comm-group-avatar { width: 52px; height: 52px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #fff; flex-shrink: 0; }
    .comm-group-info { flex: 1; }
    .comm-group-info h3 { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
    .comm-group-info p { font-size: 13px; color: var(--text-muted); }
    .comm-group-badge { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .comm-topics { margin-bottom: 40px; }
    .comm-topic { display: flex; align-items: center; gap: 16px; padding: 18px 22px; background: var(--bg-white); border-radius: var(--radius); border: 1px solid var(--border-light); margin-bottom: 10px; cursor: pointer; transition: var(--transition); }
    .comm-topic:hover { background: var(--leaf-bg); border-color: var(--leaf-light); }
    .comm-topic:focus-visible { outline: 2px solid var(--moss); outline-offset: 2px; }
    .comm-topic-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--leaf-bg); color: var(--moss); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; flex-shrink: 0; }
    .comm-topic-info { flex: 1; }
    .comm-topic-info h4 { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .comm-topic-info p { font-size: 13px; color: var(--text-muted); }
    .comm-topic-meta { text-align: right; flex-shrink: 0; }
    .comm-topic-meta .replies { font-size: 14px; font-weight: 700; color: var(--moss); }
    .comm-topic-meta .time { font-size: 12px; color: var(--text-muted); }
    @media (max-width: 768px) { .comm-stats { grid-template-columns: repeat(2, 1fr); } .comm-grid { grid-template-columns: 1fr; } .comm-topic { flex-direction: column; align-items: flex-start; gap: 8px; } .comm-topic-meta { text-align: left; display: flex; gap: 12px; } }
    @media (max-width: 480px) { .comm-stats { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-to-content">跳转到主要内容</a>

  <nav class="site-nav" role="navigation" aria-label="主导航"><div class="nav-container">
    <a href="index.html" class="nav-brand"><i class="fas fa-seedling" aria-hidden="true"></i><span>乡理人</span></a>
    <div class="nav-links" id="nav-links">
      <a href="index.html" class="nav-link">首页</a><a href="modules.html" class="nav-link">能力培养</a>
      <a href="cases.html" class="nav-link">成功案例</a><a href="courses.html" class="nav-link">课程中心</a>
      <a href="resources.html" class="nav-link">学习资料</a><a href="ai.html" class="nav-link">AI助手</a>
      <a href="community.html" class="nav-link active" aria-current="page">交流社区</a>
    </div>
    <button class="nav-toggle" id="nav-toggle" aria-label="打开导航菜单" aria-expanded="false" aria-controls="nav-links"><i class="fas fa-bars" aria-hidden="true"></i></button>
    <a href="modules.html" class="nav-cta">开始学习 <i class="fas fa-arrow-right" aria-hidden="true"></i></a>
  </div></nav>

  <main id="main-content">
    <section class="page-hero"><div class="section-container">
      <div class="section-tag">互助交流</div>
      <h1 class="section-title">交流社区</h1>
      <p class="section-subtitle">大学生村官交流平台，分享经验、互助成长</p>
    </div></section>

    <section class="section"><div class="section-container">
      <div class="comm-layout">
        <div class="comm-stats">
          <div class="comm-stat reveal"><span class="comm-stat-num">2,380</span><span class="comm-stat-label">社区成员</span></div>
          <div class="comm-stat reveal"><span class="comm-stat-num">156</span><span class="comm-stat-label">讨论话题</span></div>
          <div class="comm-stat reveal"><span class="comm-stat-num" id="groups-count">7</span><span class="comm-stat-label">地区群组</span></div>
        </div>

        <h2 class="comm-groups-title"><i class="fas fa-users" style="color:var(--moss);margin-right:8px" aria-hidden="true"></i>地区群组</h2>
        <div class="comm-grid" id="comm-grid" role="list"></div>

        <h2 class="comm-groups-title"><i class="fas fa-comments" style="color:var(--moss);margin-right:8px" aria-hidden="true"></i>热门话题</h2>
        <div class="comm-topics" id="comm-topics" role="list"></div>
      </div>
    </div></section>
  </main>

  <footer class="site-footer" role="contentinfo"><div class="footer-container">
    <div class="footer-brand"><i class="fas fa-seedling" aria-hidden="true"></i><span>"乡理人"点亮行动</span></div>
    <p class="footer-desc">致力于培养新时代乡村治理人才</p>
    <div class="footer-links">
      <a href="modules.html">能力培养</a><a href="cases.html">成功案例</a>
      <a href="courses.html">课程中心</a><a href="resources.html">学习资料</a>
      <a href="ai.html">AI助手</a><a href="community.html">交流社区</a>
    </div>
    <p class="footer-copy">© 2026 "乡理人"点亮行动 · 版本 2.0</p>
  </div></footer>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      window.addEventListener('scroll', () => document.querySelector('.site-nav').classList.toggle('scrolled', window.scrollY > 20));

      // 汉堡菜单
      const navToggle = document.getElementById('nav-toggle');
      const navLinks = document.getElementById('nav-links');
      if (navToggle && navLinks) {
        navToggle.addEventListener('click', () => {
          const isOpen = navLinks.classList.toggle('open');
          navToggle.setAttribute('aria-expanded', isOpen);
          navToggle.querySelector('i').className = isOpen ? 'fas fa-times' : 'fas fa-bars';
        });
        navLinks.querySelectorAll('.nav-link').forEach(link => {
          link.addEventListener('click', () => {
            navLinks.classList.remove('open');
            navToggle.setAttribute('aria-expanded', 'false');
            navToggle.querySelector('i').className = 'fas fa-bars';
          });
        });
      }

      renderGroups();
      renderTopics();
      const obs = new IntersectionObserver(e => e.forEach(x => { if(x.isIntersecting) x.target.classList.add('visible'); }), {threshold:0.08});
      document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    });

    function renderGroups() {
      const grid = document.getElementById('comm-grid');
      const groups = AppData.community || [];
      document.getElementById('groups-count').textContent = groups.length;
      grid.innerHTML = groups.map((g, i) => `
        <div class="comm-group reveal" role="listitem" tabindex="0" onclick="showToast('进入群组: ${escapeAttr(g.name)}')" onkeydown="if(event.key==='Enter')showToast('进入群组: ${escapeAttr(g.name)}')" style="animation-delay:${i*0.06}s">
          <div class="comm-group-avatar" style="background:${g.color}">${g.icon}</div>
          <div class="comm-group-info"><h3>${g.name}</h3><p>${g.desc}</p></div>
          <div class="comm-group-badge"><i class="fas fa-user" aria-hidden="true"></i> ${g.members}</div>
        </div>
      `).join('');
    }

    function renderTopics() {
      const topics = [
        { user: '张', title: '分享：我们村的电商助农经验', desc: '从零开始搭建村级电商平台的全过程', replies: 28, time: '2小时前' },
        { user: '李', title: '求助：如何申请乡村振兴专项资金？', desc: '想了解具体的申请流程和材料要求', replies: 15, time: '5小时前' },
        { user: '王', title: '讨论：乡村旅游如何避免同质化？', desc: '大家来聊聊各地的差异化发展思路', replies: 42, time: '1天前' },
        { user: '陈', title: '经验：农产品品牌打造的三个关键步骤', desc: '结合我们镇的实际案例分享品牌建设心得', replies: 36, time: '1天前' },
        { user: '刘', title: '分享：数字化治理在我们村的实践', desc: '智慧村务系统上线半年的效果总结', replies: 19, time: '2天前' },
        { user: '赵', title: '求助：如何动员村民参与集体经济？', desc: '遇到村民积极性不高的问题，求建议', replies: 31, time: '3天前' },
      ];
      const box = document.getElementById('comm-topics');
      box.innerHTML = topics.map((t, i) => `
        <div class="comm-topic reveal" role="listitem" tabindex="0" onclick="showToast('查看话题: ${escapeAttr(t.title)}')" onkeydown="if(event.key==='Enter')showToast('查看话题: ${escapeAttr(t.title)}')" style="animation-delay:${i*0.05}s">
          <div class="comm-topic-avatar">${t.user}</div>
          <div class="comm-topic-info"><h4>${t.title}</h4><p>${t.desc}</p></div>
          <div class="comm-topic-meta"><div class="replies">${t.replies} 回复</div><div class="time">${t.time}</div></div>
        </div>
      `).join('');
      setTimeout(() => {
        const obs = new IntersectionObserver(e => e.forEach(x => { if(x.isIntersecting) x.target.classList.add('visible'); }), {threshold:0.08});
        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
      }, 50);
    }

    // 防XSS：转义HTML属性值中的特殊字符
    function escapeAttr(s) {
      return String(s).replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showToast(msg) {
      const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
      document.getElementById('toast-container').appendChild(t);
      setTimeout(()=>t.remove(),3000);
    }

    // ESC关闭
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        const navLinks = document.getElementById('nav-links');
        const navToggle = document.getElementById('nav-toggle');
        if (navLinks && navLinks.classList.contains('open')) {
          navLinks.classList.remove('open');
          navToggle.setAttribute('aria-expanded', 'false');
          navToggle.querySelector('i').className = 'fas fa-bars';
          navToggle.focus();
        }
      }
    });
  </script>
</body>
