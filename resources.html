  <meta name="theme-color" content="#4a7c59">
  <meta property="og:title" content="学习资料 - "乡理人"点亮行动">
  <meta property="og:description" content="政策文件、行业报告、培训视频等丰富资源">
  <meta property="og:type" content="website">
  <title>学习资料 - "乡理人"点亮行动</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .res-filter { display: flex; gap: 8px; justify-content: center; margin-bottom: 36px; flex-wrap: wrap; }
    .res-filter-btn { padding: 8px 20px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-white); color: var(--text-secondary); font-size: 14px; font-weight: 600; cursor: pointer; transition: var(--transition); }
    .res-filter-btn:hover, .res-filter-btn.active { background: var(--leaf-bg); color: var(--moss); border-color: var(--moss-light); }
    .res-count { text-align: center; margin-bottom: 24px; font-size: 14px; color: var(--text-muted); }
    .res-page-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .res-page-item { display: flex; align-items: center; gap: 18px; background: var(--bg-white); border-radius: var(--radius-lg); padding: 22px 26px; border: 1px solid var(--border-light); box-shadow: var(--shadow-sm); cursor: pointer; transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease); }
    .res-page-item:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--leaf-light); }
    .res-page-item:focus-visible { outline: 2px solid var(--moss); outline-offset: 2px; }
    .res-page-icon { width: 54px; height: 54px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .res-page-info { flex: 1; min-width: 0; }
    .res-page-info h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .res-page-info p { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
    .res-page-badge { font-size: 12px; padding: 4px 12px; border-radius: 12px; background: var(--leaf-bg); color: var(--moss); font-weight: 600; flex-shrink: 0; }
    @media (max-width: 768px) { .res-page-grid { grid-template-columns: 1fr; } .res-filter { gap: 6px; } .res-filter-btn { padding: 6px 14px; font-size: 13px; } }
    @media (max-width: 480px) { .res-page-item { flex-direction: column; align-items: flex-start; gap: 12px; } .res-page-badge { align-self: flex-start; } }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-to-content">跳转到主要内容</a>

  <nav class="site-nav" role="navigation" aria-label="主导航"><div class="nav-container">
    <a href="index.html" class="nav-brand"><i class="fas fa-seedling" aria-hidden="true"></i><span>乡理人</span></a>
    <div class="nav-links" id="nav-links">
      <a href="index.html" class="nav-link">首页</a><a href="modules.html" class="nav-link">能力培养</a>
      <a href="cases.html" class="nav-link">成功案例</a><a href="courses.html" class="nav-link">课程中心</a>
      <a href="resources.html" class="nav-link active" aria-current="page">学习资料</a><a href="ai.html" class="nav-link">AI助手</a>
      <a href="community.html" class="nav-link">交流社区</a>
    </div>
    <button class="nav-toggle" id="nav-toggle" aria-label="打开导航菜单" aria-expanded="false" aria-controls="nav-links"><i class="fas fa-bars" aria-hidden="true"></i></button>
    <a href="modules.html" class="nav-cta">开始学习 <i class="fas fa-arrow-right" aria-hidden="true"></i></a>
  </div></nav>

  <main id="main-content">
    <section class="page-hero"><div class="section-container">
      <div class="section-tag">知识库</div>
      <h1 class="section-title">学习资料</h1>
      <p class="section-subtitle">政策文件、行业报告、培训视频等丰富资源，助力学习成长</p>
    </div></section>

    <section class="section"><div class="section-container">
      <div class="res-filter" id="res-filter" role="tablist" aria-label="资料分类筛选"></div>
      <div class="res-count" id="res-count" aria-live="polite"></div>
      <div class="res-page-grid" id="res-grid" role="list"></div>
    </div></section>
  </main>

  <footer class="site-footer" role="contentinfo"><div class="footer-container">
    <div class="footer-brand"><i class="fas fa-seedling" aria-hidden="true"></i><span>"乡理人"点亮行动</span></div>
    <p class="footer-desc">致力于培养新时代乡村治理人才</p>
    <div class="footer-links">
      <a href="modules.html">能力培养</a><a href="cases.html">成功案例</a>
      <a href="courses.html">课程中心</a><a href="resources.html">学习资料</a>
      <a href="ai.html">AI助手</a><a href="community.html">交流社区</a>
    </div>
    <p class="footer-copy">© 2026 "乡理人"点亮行动 · 版本 2.0</p>
  </div></footer>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="js/data.js"></script>
  <script>
    let currentFilter = '全部';
    const catIcon = {
      policy: {bg:'var(--leaf-bg)',color:'var(--moss)',icon:'fas fa-landmark'},
      report: {bg:'var(--sky-bg)',color:'#1976d2',icon:'fas fa-chart-bar'},
      video:  {bg:'var(--warmth)',color:'#f57f17',icon:'fas fa-video'},
      book:   {bg:'var(--earth-bg)',color:'var(--earth)',icon:'fas fa-book'}
    };

    document.addEventListener('DOMContentLoaded', () => {
      window.addEventListener('scroll', () => document.querySelector('.site-nav').classList.toggle('scrolled', window.scrollY > 20));

      // 汉堡菜单
      const navToggle = document.getElementById('nav-toggle');
      const navLinks = document.getElementById('nav-links');
      if (navToggle && navLinks) {
        navToggle.addEventListener('click', () => {
          const isOpen = navLinks.classList.toggle('open');
          navToggle.setAttribute('aria-expanded', isOpen);
          navToggle.querySelector('i').className = isOpen ? 'fas fa-times' : 'fas fa-bars';
        });
        navLinks.querySelectorAll('.nav-link').forEach(link => {
          link.addEventListener('click', () => {
            navLinks.classList.remove('open');
            navToggle.setAttribute('aria-expanded', 'false');
            navToggle.querySelector('i').className = 'fas fa-bars';
          });
        });
      }

      // 筛选按钮
      const cats = ['全部', ...new Set(AppData.resources.map(r => r.category))];
      document.getElementById('res-filter').innerHTML = cats.map(c =>
        `<button class="res-filter-btn${c==='全部'?' active':''}" onclick="filterRes('${c}')" role="tab" aria-selected="${c==='全部'}">${c}</button>`
      ).join('');
      renderRes();
    });

    function filterRes(cat) {
      currentFilter = cat;
      document.querySelectorAll('.res-filter-btn').forEach(b => {
        const isActive = b.textContent === cat;
        b.classList.toggle('active', isActive);
        b.setAttribute('aria-selected', isActive);
      });
      renderRes();
    }

    function renderRes() {
      const list = currentFilter === '全部' ? AppData.resources : AppData.resources.filter(r => r.category === currentFilter);
      const grid = document.getElementById('res-grid');

      document.getElementById('res-count').textContent = `共 ${list.length} 份资料`;

      grid.innerHTML = list.map((r, i) => {
        const ci = catIcon[r.type] || catIcon.book;
        return `<div class="res-page-item reveal" role="listitem" tabindex="0" onclick="showToast('打开: ${r.title}')" onkeydown="if(event.key==='Enter')showToast('打开: ${r.title}')" style="animation-delay:${i*0.04}s">
          <div class="res-page-icon" style="background:${ci.bg};color:${ci.color}"><i class="${ci.icon}" aria-hidden="true"></i></div>
          <div class="res-page-info"><h3>${r.title}</h3><p>${r.description}</p></div>
          <span class="res-page-badge">${r.format || 'PDF'}</span>
        </div>`;
      }).join('');
      const obs = new IntersectionObserver(e => e.forEach(x => { if(x.isIntersecting) x.target.classList.add('visible'); }), {threshold:0.08});
      document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    }

    function showToast(msg) {
      const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
      document.getElementById('toast-container').appendChild(t);
      setTimeout(()=>t.remove(),3000);
    }

    // ESC关闭
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        const navLinks = document.getElementById('nav-links');
        const navToggle = document.getElementById('nav-toggle');
        if (navLinks && navLinks.classList.contains('open')) {
          navLinks.classList.remove('open');
          navToggle.setAttribute('aria-expanded', 'false');
          navToggle.querySelector('i').className = 'fas fa-bars';
          navToggle.focus();
        }
      }
    });
  </script>
</body>
</html>
